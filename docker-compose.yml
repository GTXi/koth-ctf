version: "3.8"

networks:
  koth_net:
    driver: bridge

services:
  db:
    image: mysql:8.0
    container_name: koth_db
    environment:
      MYSQL_ROOT_PASSWORD: koth_root
      MYSQL_DATABASE: koth
      MYSQL_USER: koth_user
      MYSQL_PASSWORD: koth_pass
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - koth_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ukoth_user", "-pkoth_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  py-server1:
    build: ./python-server
    command: ["python", "server1.py"]
    container_name: koth_py_srv1
    environment:
      DB_HOST: koth_db
      DB_USER: koth_user
      DB_PASS: koth_pass
      DB_NAME: koth
    networks:
      - koth_net
    depends_on:
      db:
        condition: service_healthy

  py-server2:
    build: ./python-server
    command: ["python", "server2.py"]
    container_name: koth_py_srv2
    environment:
      DB_HOST: koth_db
      DB_USER: koth_user
      DB_PASS: koth_pass
      DB_NAME: koth
    networks:
      - koth_net
    depends_on:
      db:
        condition: service_healthy

  py-server3:
    build: ./python-server
    command: ["python", "server3.py"]
    container_name: koth_py_srv3
    environment:
      DB_HOST: koth_db
      DB_USER: koth_user
      DB_PASS: koth_pass
      DB_NAME: koth
    networks:
      - koth_net
    depends_on:
      db:
        condition: service_healthy

  py-client1:
    build: ./python-client
    command: ["python", "client1.py"]
    container_name: koth_py_cli1
    environment:
      SERVER_HOST: koth_py_srv1
      SERVER_PORT: "5001"
    networks:
      - koth_net
    depends_on:
      - py-server1

  py-client2:
    build: ./python-client
    command: ["python", "client2.py"]
    container_name: koth_py_cli2
    environment:
      SERVER_HOST: koth_py_srv2
      SERVER_PORT: "5002"
    networks:
      - koth_net
    depends_on:
      - py-server2

  py-client3:
    build: ./python-client
    command: ["python", "client3.py"]
    container_name: koth_py_cli3
    environment:
      SERVER_HOST: koth_py_srv3
      SERVER_PORT: "5003"
    networks:
      - koth_net
    depends_on:
      - py-server3

  c-server1:
    build: ./c-server
    command: ["./server1"]
    container_name: koth_c_srv1
    environment:
      DB_HOST: koth_db
      DB_USER: koth_user
      DB_PASS: koth_pass
      DB_NAME: koth
    networks:
      - koth_net
    depends_on:
      db:
        condition: service_healthy

  c-client1:
    build: ./c-client
    command: ["./client1"]
    container_name: koth_c_cli1
    environment:
      SERVER_HOST: koth_c_srv1
    networks:
      - koth_net
    depends_on:
      - c-server1

  c-server2:
    build: ./c-server
    command: ["./server2"]
    container_name: koth_c_srv2
    environment:
      DB_HOST: koth_db
      DB_USER: koth_user
      DB_PASS: koth_pass
      DB_NAME: koth
    networks:
      - koth_net
    depends_on:
      db:
        condition: service_healthy

  c-client2:
    build: ./c-client
    command: ["./client2"]
    container_name: koth_c_cli2
    environment:
      SERVER_HOST: koth_c_srv2
    networks:
      - koth_net
    depends_on:
      - c-server2
