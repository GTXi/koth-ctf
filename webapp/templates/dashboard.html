<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Node — Live Telemetry</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="crown">🪙</div>
            <h1>Mining Farm Validator</h1>
            <p class="subtitle">ITT440 Network Programming — Live Node Telemetry</p>
            <div class="refresh-badge">
                Auto-refresh in <span id="countdown">10</span>s
            </div>
        </header>

        <div class="chart-container">
            <canvas id="scoreChart"></canvas>
        </div>

        <div class="scoreboard">
            <table id="scores-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Validator Node</th>
                        <th>Blocks Mined</th>
                        <th>Last Hash Time</th>
                    </tr>
                </thead>
                <tbody id="scores-body">
                    <!-- JavaScript will populate this -->
                </tbody>
            </table>
        </div>
        <footer>
            <p>Block rewards validated every 30 seconds &nbsp;·&nbsp; Dashboard refreshes every 10 seconds</p>
            <p class="port-info">
                GPU Rigs (Py): :5001 :5002 :5003 &nbsp;|&nbsp; ASIC Miners (C): :5004 :5005
            </p>
        </footer>
    </div>
    
    <!-- Injecting the Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
